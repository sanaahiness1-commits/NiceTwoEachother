<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<!-- Browser tab name -->
<title>Nice Two Each Other</title>


<!-- Connects this page to your shared CSS file -->
<link rel="stylesheet" href="style.css">


</head>


<body>


<!-- =========================================================
     TOP NAVIGATION BAR
     - Shows website name
     - Contains hamburger menu button
========================================================= -->

<nav>


  <!-- Website title -->
  <span>
    Nice Two Each Other
  </span>



  <!-- Hamburger button
       Clicking it opens the side menu -->

  <button class="hamburger" onclick="toggleMenu()">


    <!-- Three lines of hamburger icon -->

    <span></span>

    <span></span>

    <span></span>


  </button>


</nav>





<!-- =========================================================
     LIVE AUDIO SECTION
     - Main player area
     - User clicks button to start/pause audio
========================================================= -->


<section class="live-player">



  <!-- Holds play button + episode information -->

  <div class="episode-row">



    <!-- Play/Pause button -->

    <button id="playBtn" class="play-button">

      ▶

    </button>





    <!-- Episode title -->

    <div class="episode-text">


      <h2>
        Episode 1 — Title Here
      </h2>


      <p>
        Live conversation happening now
      </p>


    </div>



  </div>





  <!-- =======================================================
       AUDIO SOURCE
       - This is the actual audio file/stream
       - JavaScript controls this player
  ======================================================== -->


  <audio id="audioStream">


    <!-- Replace YOUR_AUDIO_FILE.mp3 with your audio -->
    <source src="YOUR_AUDIO_FILE.mp3" type="audio/mpeg">


    Your browser does not support audio playback.


  </audio>



</section>







<!-- =========================================================
     DARK OVERLAY
     - Appears behind side menu
     - Clicking it closes menu
========================================================= -->


<div 
class="overlay" 
id="overlay" 
onclick="toggleMenu()">
</div>






<!-- =========================================================
     SIDE MENU
     - Hidden until hamburger is clicked
========================================================= -->


<div id="menu" class="menu-panel">



  <!-- Homepage link -->

  <a href="index.html">
    Home
  </a>




  <!-- About page (we can create later) -->

  <a href="#">
    About
  </a>





  <!-- Archive page -->

  <a href="archive.html">
    Archive
  </a>



</div>







<!-- =========================================================
     JAVASCRIPT FILE
     - Controls hamburger menu
     - Controls audio button
========================================================= -->


<script src="script.js"></script>



</body>


</html>
