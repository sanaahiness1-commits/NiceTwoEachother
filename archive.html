<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archive</title>


<style>

/* =========================================================
   PAGE SETTINGS
   - Black archive background
========================================================= */

body {

  margin: 0;

  font-family: Arial, sans-serif;

  background: black;

}



/* =========================================================
   HAMBURGER MENU
   - Floating white button
   - Top right like Instagram
========================================================= */

.hamburger {

  position: fixed;

  top: 25px;

  right: 30px;

  z-index: 200;


  display: flex;

  flex-direction: column;

  justify-content: space-between;


  width: 28px;

  height: 20px;


  background: none;

  border: none;

  cursor: pointer;

}



/* Three white hamburger lines */

.hamburger span {

  display: block;

  width: 100%;

  height: 3px;

  background: white;

  border-radius: 5px;

}



/* =========================================================
   SIDE MENU
========================================================= */

.menu-panel {

  position: fixed;

  top: 0;

  right: -350px;


  width: 280px;

  height: 100%;


  background: white;


  padding: 80px 20px;


  transition: right .3s ease;


  z-index: 150;

}



/* Opens menu */

.menu-panel.open {

  right: 0;

}



/* Menu links */

.menu-panel a {

  display: block;

  padding: 15px 10px;

  color: #333;

  text-decoration: none;

  font-size: 18px;

}



/* =========================================================
   DARK OVERLAY
========================================================= */

.overlay {

  display: none;

  position: fixed;

  inset: 0;


  background: rgba(0,0,0,.4);


  z-index: 100;

}


.overlay.open {

  display: block;

}



/* =========================================================
   ARCHIVE GRID
   - Instagram style 3 columns
========================================================= */


.archive-grid {

  display: grid;


  grid-template-columns: repeat(3, 1fr);


  gap: 8px;


  padding-top: 95px;


  padding-left: 40px;

  padding-right: 40px;


  padding-bottom: 40px;

}



/* =========================================================
   NORMAL IMAGE CARDS
========================================================= */

.archive-item img {

  width: 100%;


  aspect-ratio: 3 / 4;


  object-fit: cover;


  cursor: pointer;

}


.archive-item img:hover {

  opacity: .8;

}



/* =========================================================
   FLIP CARD
   - Used for episode playlist cards
========================================================= */


.flip-card {


  /* Creates 3D flipping effect */

  perspective: 1000px;


}



/* Holds both sides */

.flip-card-inner {


  position: relative;


  width: 100%;


  aspect-ratio: 3 / 4;


  transition: transform .6s;


  transform-style: preserve-3d;


}



/* Rotates card */

.flip-card.flipped .flip-card-inner {

  transform: rotateY(180deg);

}



/* Front and back overlap */

.flip-front,
.flip-back {


  position: absolute;


  width: 100%;

  height: 100%;


  top: 0;

  left: 0;


  backface-visibility: hidden;


}



/* Front image */

.flip-front img {


  width:100%;

  height:100%;


  object-fit:cover;


}



/* Spotify side */

.flip-back {


  transform: rotateY(180deg);


}



/* Spotify iframe fills card */

.flip-back iframe {


  width:100%;


  height:100%;


  border:none;


}



</style>


</head>



<body>



<!-- =========================================================
     HAMBURGER BUTTON
========================================================= -->


<button class="hamburger" onclick="toggleMenu()">

<span></span>

<span></span>

<span></span>

</button>




<!-- DARK OVERLAY -->

<div 
class="overlay"
id="overlay"
onclick="toggleMenu()">
</div>





<!-- SIDE MENU -->

<div id="menu" class="menu-panel">


<a href="index.html">
Home
</a>


<a href="#">
About
</a>


<a href="archive.html">
Archive
</a>


</div>





<!-- =========================================================
     ARCHIVE GRID
========================================================= -->


<div class="archive-grid">



<div class="archive-item">
<img src="images/episode10-Finale.jpg">
</div>



<div class="archive-item">
<img src="images/episode9-idk.png">
</div>



<div class="archive-item">
<img src="images/episode8-Jason.png">
</div>



<div class="archive-item">
<img src="images/episode7-whats-going-on.png">
</div>



<div class="archive-item">
<img src="images/episode6-rando.png">
</div>



<div class="archive-item">
<img src="images/episode5-bread&Butter.png">
</div>



<div class="archive-item">
<img src="images/episode4-hiphop.png">
</div>



<div class="archive-item">
<img src="images/episode3-no-Sanaa.png">
</div>



<div class="archive-item">
<img src="images/episode2-political-histories.png">
</div>





<!-- =========================================================
     EPISODE 1 FLIP CARD
========================================================= -->


<div class="archive-item flip-card">


<div class="flip-card-inner">



<!-- FRONT -->

<div class="flip-front">

<img src="images/episode1-pink.png">

</div>




<!-- BACK -->

<div class="flip-back">


<iframe

src="https://open.spotify.com/embed/playlist/4mlzSpy8uVb1aNuPQIvYMR?utm_source=generator&theme=0&si=1e5f9b62a208423e"

allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">

</iframe>


</div>



</div>


</div>




</div>






<script>


/* =========================================================
   OPEN/CLOSE MENU
========================================================= */


function toggleMenu(){


document.querySelector(".hamburger")
.classList.toggle("open");


document.getElementById("menu")
.classList.toggle("open");


document.getElementById("overlay")
.classList.toggle("open");


}




/* =========================================================
   FLIP EPISODE CARDS
========================================================= */


const cards = document.querySelectorAll(".flip-card");


cards.forEach(card => {


card.addEventListener("click",()=>{


card.classList.toggle("flipped");


});


});


</script>



</body>

</html>
